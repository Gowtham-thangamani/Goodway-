          - generic [ref=e59]: // WHO WE ARE
          - heading "A National Establishment with International Expertise" [level=3] [ref=e60]
        - paragraph [ref=e61]: Good Way General Trading was established in the year 2014. We are a national company with international expertise in the oil, gas, petrochemical, power and water sectors with a reputation for a progressive and forward-looking approach to business. Our business is licensed by the Abu Dhabi Department of Economic Development under Licence No. CN-1843054 for onshore and offshore oil & gas fields and facilities services, and for general trading. We are VAT-registered with the UAE Federal Tax Authority under TRN 100464283900003 since 01 February 2018, and a member of the Abu Dhabi Chamber of Commerce (No. 328518).
