      - generic [ref=e102]:
        - generic [ref=e103]:
          - generic [ref=e104]: // OUR MISSION
          - heading "Our Mission & Promise" [level=3] [ref=e105]
        - paragraph [ref=e107]: Our mission is to be the UAE's most dependable authorised-distribution partner for industrial, scientific and commercial supply — sourcing original-equipment products from leading international principals and delivering them on time, on specification, and with the compliance paperwork every UAE buyer needs. We listen first, quote fast, and stand behind every delivery with local warranty support.
      - generic [ref=e110]:
        - generic [ref=e111]:
          - generic [ref=e112]: // OUR APPROACH
          - heading "Authorised distribution, not parallel imports." [level=3] [ref=e113]
          - paragraph [ref=e114]: Goodway operates as a direct channel between international principals and UAE buyers. Every product we ship is sourced through a formal distribution agreement — not a grey-market intermediary — which means documented origin, full manufacturer warranty, and accountability that stays in Abu Dhabi.
        - generic [ref=e115]:
          - article [ref=e116]:
            - heading "Original-equipment quality" [level=4] [ref=e117]
            - paragraph [ref=e118]: Direct agreements with AEES, REP, Arbochim, Lütze, Fisher Scientific, Merck, Cooper Crouse-Hinds, Yuasa, Westinghouse, ATMI, Efftec and McMaster-Carr. Every shipment carries the principal's serial numbers, certificates of conformity, and mill test reports where applicable.
          - article [ref=e119]:
            - heading "Local warranty & after-sales" [level=4] [ref=e120]
            - paragraph [ref=e121]: Warranty claims stay with Goodway as the authorised UAE channel. No international escalation, no courier returns to Europe, no translation delays — our technical desk handles the claim and coordinates with the principal on your behalf.
          - article [ref=e122]:
            - heading "Compliance paperwork — done" [level=4] [ref=e123]
            - paragraph [ref=e124]:
              - text: "Every quote includes the relevant paperwork bundle: Civil Defence approval letters, NFPA 80 test certificates, Certificates of Conformity, Free-Sale certificates, and manufacturer warranty terms. VAT-compliant invoicing under"
              - strong [ref=e125]: TRN 100464283900003
              - text: .
          - article [ref=e126]:
            - heading "Delivery across all 7 emirates" [level=4] [ref=e127]
            - paragraph [ref=e128]: Warehouse-to-site delivery anywhere in Abu Dhabi, Dubai, Sharjah, Ajman, Umm Al Quwain, Ras Al Khaimah and Fujairah. Inbound freight consolidation, customs clearance and on-site handover managed end-to-end so your procurement team deals with one invoice and one accountable party.
