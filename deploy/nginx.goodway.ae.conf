# /etc/nginx/sites-available/goodway.ae
# Goodway — single-origin config: static site + admin/API on one host.
# Enable with:
#   sudo ln -sf /etc/nginx/sites-available/goodway.ae /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumes:
#   - Cloned repo at /var/www/goodway  (the repo root that contains /site)
#   - Node server running on 127.0.0.1:4010 via pm2 (see pm2.ecosystem.config.js)
#   - SSL issued via certbot for goodway.ae + www.goodway.ae

# ---------- HTTP → HTTPS (and www → apex) ----------
server {
  listen 80;
  listen [::]:80;
  server_name goodway.ae www.goodway.ae;
  # Let certbot answer ACME challenges without a redirect loop
  location /.well-known/acme-challenge/ { root /var/www/html; }
  location / { return 301 https://goodway.ae$request_uri; }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.goodway.ae;
  ssl_certificate     /etc/letsencrypt/live/goodway.ae/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/goodway.ae/privkey.pem;
  return 301 https://goodway.ae$request_uri;
}

# ---------- Main site ----------
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name goodway.ae;

  ssl_certificate     /etc/letsencrypt/live/goodway.ae/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/goodway.ae/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  root  /var/www/goodway/site;
  index index.html;

  # Reasonable body size for the lead form (BOQ paste can be big)
  client_max_body_size 2M;

  # Gzip the HTML / CSS / JS / JSON / SVG. Images are already compressed.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
  gzip_min_length 1024;
  gzip_vary on;

  # Security headers — tuned for a static + self-hosted admin.
  add_header X-Content-Type-Options  "nosniff" always;
  add_header X-Frame-Options         "SAMEORIGIN" always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

  # ---------- 1. API + admin  →  Node server ----------
  location ~ ^/(api|admin)(/|$) {
    proxy_pass         http://127.0.0.1:4010;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
  }

  # ---------- 2. Long-cached static assets ----------
  # Images / fonts / CSS / JS get a 30-day cache because we bust by
  # ?v=IMG_VER in goodway-enhance.js — change once, every browser refreshes.
  location ~* \.(?:css|js|woff2?|ttf|eot|png|jpe?g|webp|avif|gif|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
    try_files $uri =404;
  }

  # ---------- 3. Clean URLs + HTML ----------
  # /about → /about.html, /divisions/electrical → /divisions/electrical.html
  location / {
    try_files $uri $uri/index.html $uri.html $uri/ /404.html;
  }

  # ---------- 4. Error pages ----------
  error_page 401 /401.html;
  error_page 404 /404.html;
}
