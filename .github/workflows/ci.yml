name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    name: Static site — HTML / CSS / JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JS syntax check (goodway-enhance.js)
        run: node --check js/goodway-enhance.js

      - name: CSS brace balance
        run: |
          node -e "
            const fs = require('fs');
            for (const f of ['css/goodway-enhance.css','css/goodway-brand.css']) {
              const s = fs.readFileSync(f,'utf8');
              const o = (s.match(/{/g)||[]).length, c = (s.match(/}/g)||[]).length;
              if (o !== c) { console.error(f + ' braces unbalanced: ' + o + ' / ' + c); process.exit(1); }
              console.log(f + ' OK (' + o + ' rules)');
            }
          "

      - name: HTML sanity — canonical + og:image + defer on scripts
        run: |
          node -e "
            const fs = require('fs'), path = require('path');
            const files = fs.readdirSync('.').filter(f => f.endsWith('.html'))
              .concat(fs.readdirSync('divisions').map(f => 'divisions/' + f));
            let fails = 0;
            for (const f of files) {
              const s = fs.readFileSync(f,'utf8');
              const checks = [
                { label: 'canonical', re: /<link rel=\"canonical\"/ },
                { label: 'og:image',  re: /property=\"og:image\"/ },
                { label: 'no w-form class', re: /class=\"newsletter-form w-form\"/, mustBeAbsent: true },
                { label: 'jQuery defer', re: /jquery-3\.5\.1[^\"]+\"[^>]* defer/, require: s.includes('jquery-3.5.1') },
                { label: 'webflow.js defer', re: /webflow\.js\"[^>]* defer/, require: s.includes('webflow.js') }
              ];
              for (const c of checks) {
                if (c.require === false) continue;
                const matched = c.re.test(s);
                if (c.mustBeAbsent ? matched : !matched) {
                  console.error(f + ' FAIL: ' + c.label);
                  fails++;
                }
              }
            }
            if (fails) { console.error('FAIL: ' + fails + ' checks failed'); process.exit(1); }
            console.log('All ' + files.length + ' pages passed static checks.');
          "

      - name: Broken-href scan
        run: |
          node -e "
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.endsWith('.html'))
              .concat(fs.readdirSync('divisions').map(f => 'divisions/' + f));
            let bad = 0;
            for (const f of files) {
              const s = fs.readFileSync(f,'utf8');
              const empty = (s.match(/href=\"\"/g)||[]).length;
              const hash  = (s.match(/href=\"#\"/g)||[]).length;
              if (empty || hash) {
                console.error(f + ': empty=' + empty + ' hash=' + hash);
                bad++;
              }
            }
            if (bad) process.exit(1);
            console.log('No empty or # hrefs across ' + files.length + ' pages.');
          "

  admin-tests:
    name: Admin server — build round-trip
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Syntax check JS
        run: |
          for f in server.js db.js middleware/*.js routes/*.js scripts/*.js lib/*.js; do
            node --check "$f"
          done
      - name: EJS template parse check
        run: |
          node -e "
            const fs = require('fs'), path = require('path'), ejs = require('ejs');
            const walk = (d) => fs.readdirSync(d, {withFileTypes:true}).flatMap(e =>
              e.isDirectory() ? walk(path.join(d,e.name)) : [path.join(d,e.name)]);
            const files = walk('views').filter(f => f.endsWith('.ejs'));
            for (const f of files) {
              try { ejs.compile(fs.readFileSync(f,'utf8'), { filename: f }); }
              catch (e) { console.error(f + ' FAIL'); console.error(e.message); process.exit(1); }
            }
            console.log('All ' + files.length + ' EJS templates compiled OK.');
          "
      - name: Seed + build-site round-trip
        run: |
          npm run seed
          npm run build-site
          # re-seed must still succeed against the regenerated HTML
          npm run seed
