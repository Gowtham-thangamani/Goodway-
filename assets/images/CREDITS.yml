# Goodway Image Licensing Register
# Mandatory entry per image. Drives compliance audits and future replacements.
#
# Fields:
#   file:                path relative to /assets/images/
#   source:              commissioned | authorised-distributor | stock-unsplash | stock-pexels | stock-adobe | brand-guidelines | internal
#   photographer|author: name (or organisation)
#   date:                ISO-8601 YYYY-MM-DD
#   licence:             exclusive-transfer | unsplash-licence | pexels-licence | adobe-std | authorised-distributor-use | internal-use
#   attribution:         required-on-use | not-required
#   model-release:       yes | no | n/a
#   notes:               free-form (optional)

