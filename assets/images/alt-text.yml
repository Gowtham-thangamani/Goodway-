# Goodway Alt-Text Registry
# Single source of truth for accessibility + SEO image descriptions.
# Keyed by file path (relative to /assets/images/).
# Build scripts (sitemap-images.xml generator + any server-side template
# layer) pull from this file. If you add a new image, add its alt here first.

# Decorative images — use `alt: ""` and set `aria-hidden: true` in HTML.
# Never start an alt with "image of" or "picture of".
# Max 125 chars. Include brand where relevant.

