<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" role="img" aria-label="Portable ablution and shower block — multi-stall front view with split A/C">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2b3c"/>
      <stop offset="1" stop-color="#0e1a2b"/>
    </linearGradient>
    <linearGradient id="cabin2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e2e4ea"/>
      <stop offset="1" stop-color="#a4abb6"/>
    </linearGradient>
    <linearGradient id="ground2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d3a32"/>
      <stop offset="1" stop-color="#2a2823"/>
    </linearGradient>
    <linearGradient id="doorOpen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e1a2b"/>
      <stop offset="1" stop-color="#1a2b3c"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="640" fill="url(#sky2)"/>

  <!-- Sun glow -->
  <circle cx="660" cy="140" r="80" fill="#c9a961" opacity="0.16"/>
  <circle cx="660" cy="140" r="40" fill="#c9a961" opacity="0.28"/>

  <!-- Ground -->
  <rect x="0" y="500" width="800" height="140" fill="url(#ground2)"/>
  <rect x="0" y="500" width="800" height="3" fill="rgba(201,169,97,0.30)"/>

  <!-- Cabin body -->
  <g transform="translate(140,140)">
    <!-- Top blue trim -->
    <rect x="0" y="0" width="500" height="22" fill="#1a4d7a"/>

    <!-- Walls -->
    <rect x="0" y="22" width="500" height="276" fill="url(#cabin2)"/>

    <!-- Bottom trim -->
    <rect x="0" y="298" width="500" height="22" fill="#1a4d7a"/>

    <!-- Internal divider seams (multi-stall) -->
    <line x1="167" y1="22" x2="167" y2="298" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>
    <line x1="333" y1="22" x2="333" y2="298" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>

    <!-- Stall 1 — closed door -->
    <rect x="32" y="80" width="80" height="180" fill="#ced1d8" stroke="#3a3a3a" stroke-width="1"/>
    <circle cx="98" cy="172" r="2.2" fill="#3a3a3a"/>
    <rect x="32" y="80" width="80" height="6" fill="#1a4d7a"/>

    <!-- Stall 2 — open door (worker can enter) -->
    <rect x="198" y="80" width="80" height="180" fill="url(#doorOpen)" stroke="#3a3a3a" stroke-width="1"/>
    <rect x="278" y="74" width="6" height="190" fill="#3a3a3a"/>
    <!-- Open door swung outward -->
    <rect x="284" y="78" width="80" height="184" fill="#dadde3" stroke="#3a3a3a" stroke-width="1" transform="skewY(-2) translate(-2,4)"/>

    <!-- Stall 3 — closed door -->
    <rect x="388" y="80" width="80" height="180" fill="#ced1d8" stroke="#3a3a3a" stroke-width="1"/>
    <circle cx="402" cy="172" r="2.2" fill="#3a3a3a"/>
    <rect x="388" y="80" width="80" height="6" fill="#1a4d7a"/>

    <!-- Roof vent / light fixture -->
    <circle cx="234" cy="42" r="8" fill="#3a3a3a"/>
    <circle cx="234" cy="42" r="5" fill="#fafafa"/>

    <!-- Goodway label plate -->
    <rect x="370" y="34" width="92" height="40" fill="#fafafa" stroke="#c9a961" stroke-width="1"/>
    <text x="416" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#7a1f24">Good Way General Trading</text>
    <text x="416" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3a4253">Mussafah Industrial Area · M-14</text>
    <text x="416" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3a4253">+971 56 442 3539</text>

    <!-- Corner caps -->
    <rect x="-4" y="-4" width="14" height="20" fill="#0e1a2b"/>
    <rect x="490" y="-4" width="14" height="20" fill="#0e1a2b"/>
    <rect x="-4" y="304" width="14" height="22" fill="#0e1a2b"/>
    <rect x="490" y="304" width="14" height="22" fill="#0e1a2b"/>

    <!-- Frame chassis -->
    <rect x="-12" y="320" width="524" height="14" fill="#3a3a3a"/>
    <path d="M-12 334 L30 376 L70 334 Z" fill="#3a3a3a"/>
    <path d="M488 334 L450 376 L420 334 Z" fill="#3a3a3a"/>
    <rect x="220" y="334" width="60" height="42" fill="#3a3a3a"/>
  </g>

  <!-- Wall-mounted split A/C unit -->
  <g transform="translate(76,196)">
    <rect x="0" y="0" width="64" height="38" fill="#fafafa" stroke="#bdc1c8"/>
    <rect x="0" y="0" width="64" height="6" fill="#bdc1c8"/>
    <line x1="6" y1="14" x2="58" y2="14" stroke="#bdc1c8" stroke-width="1"/>
    <line x1="6" y1="20" x2="58" y2="20" stroke="#bdc1c8" stroke-width="1"/>
    <line x1="6" y1="26" x2="58" y2="26" stroke="#bdc1c8" stroke-width="1"/>
    <circle cx="58" cy="3" r="1" fill="#c9a961"/>
  </g>

  <!-- Stairs to open stall -->
  <g transform="translate(338,400)">
    <rect x="0" y="0" width="86" height="100" fill="#9aa1ae"/>
    <line x1="0" y1="22" x2="86" y2="22" stroke="#3a3a3a" stroke-width="1.4"/>
    <line x1="0" y1="46" x2="86" y2="46" stroke="#3a3a3a" stroke-width="1.4"/>
    <line x1="0" y1="72" x2="86" y2="72" stroke="#3a3a3a" stroke-width="1.4"/>
    <!-- Handrails -->
    <line x1="-2" y1="-50" x2="0" y2="0" stroke="#dadde3" stroke-width="2"/>
    <line x1="-2" y1="-50" x2="-2" y2="100" stroke="#dadde3" stroke-width="2"/>
    <line x1="86" y1="-50" x2="84" y2="0" stroke="#dadde3" stroke-width="2"/>
    <line x1="86" y1="-50" x2="86" y2="100" stroke="#dadde3" stroke-width="2"/>
  </g>

  <!-- Worker silhouette in safety vest -->
  <g transform="translate(620,360)">
    <!-- Hard hat -->
    <ellipse cx="14" cy="6" rx="14" ry="5" fill="#fafafa"/>
    <path d="M0 6 Q14 -8 28 6" fill="#fafafa"/>
    <!-- Head -->
    <circle cx="14" cy="14" r="6" fill="#cb9f7a"/>
    <!-- Body in maroon shirt + reflective vest -->
    <rect x="6" y="22" width="16" height="32" fill="#7a1f24"/>
    <rect x="4" y="22" width="20" height="34" fill="#d8d62a" opacity="0.92"/>
    <rect x="4" y="32" width="20" height="3" fill="#fafafa"/>
    <rect x="4" y="46" width="20" height="3" fill="#fafafa"/>
    <!-- Trousers -->
    <rect x="6" y="56" width="7" height="26" fill="#1a2b3c"/>
    <rect x="15" y="56" width="7" height="26" fill="#1a2b3c"/>
    <!-- Shoes -->
    <rect x="6" y="80" width="8" height="4" fill="#0e1a2b"/>
    <rect x="14" y="80" width="8" height="4" fill="#0e1a2b"/>
  </g>

  <!-- Subtle ground dust band -->
  <ellipse cx="400" cy="510" rx="320" ry="8" fill="rgba(201,169,97,0.10)"/>
</svg>
