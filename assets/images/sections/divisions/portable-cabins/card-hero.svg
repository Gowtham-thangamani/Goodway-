<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Portable cabins and site containers — Goodway division illustration">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2b3c"/>
      <stop offset="1" stop-color="#0e1a2b"/>
    </linearGradient>
    <linearGradient id="cabin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dadde3"/>
      <stop offset="1" stop-color="#9aa1ae"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d3a32"/>
      <stop offset="1" stop-color="#2a2823"/>
    </linearGradient>
    <pattern id="corrugation" width="6" height="20" patternUnits="userSpaceOnUse">
      <rect width="6" height="20" fill="url(#cabin)"/>
      <line x1="3" y1="0" x2="3" y2="20" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Sky / backdrop -->
  <rect width="480" height="320" fill="url(#sky)"/>

  <!-- Distant gold sun glow -->
  <circle cx="380" cy="90" r="42" fill="#c9a961" opacity="0.18"/>
  <circle cx="380" cy="90" r="22" fill="#c9a961" opacity="0.32"/>

  <!-- Ground band -->
  <rect x="0" y="246" width="480" height="74" fill="url(#ground)"/>
  <rect x="0" y="246" width="480" height="2" fill="rgba(201,169,97,0.35)"/>

  <!-- Distant tower / horizon detail -->
  <path d="M40 246 L52 200 L64 246 Z" fill="#1f3142" opacity="0.7"/>
  <rect x="56" y="220" width="3" height="26" fill="#1f3142" opacity="0.7"/>

  <!-- Cabin body (container) -->
  <g transform="translate(120,104)">
    <!-- Frame chassis -->
    <rect x="-8" y="148" width="220" height="10" fill="#3a3a3a"/>
    <path d="M-8 158 L20 178 L40 158 Z" fill="#3a3a3a"/>
    <path d="M204 158 L184 178 L160 158 Z" fill="#3a3a3a"/>
    <line x1="60" y1="158" x2="80" y2="178" stroke="#3a3a3a" stroke-width="6"/>
    <line x1="120" y1="158" x2="140" y2="178" stroke="#3a3a3a" stroke-width="6"/>

    <!-- Top trim band (Goodway blue accent) -->
    <rect x="-4" y="-4" width="212" height="14" fill="#1a4d7a"/>

    <!-- Cabin walls (corrugated) -->
    <rect x="0" y="10" width="204" height="138" fill="url(#corrugation)"/>

    <!-- Bottom trim band -->
    <rect x="-4" y="138" width="212" height="14" fill="#1a4d7a"/>

    <!-- Goodway label plate -->
    <rect x="34" y="22" width="68" height="34" fill="#fafafa" stroke="#c9a961" stroke-width="0.8"/>
    <text x="68" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#7a1f24">Good Way General Trading</text>
    <text x="68" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#3a4253">Mussafah · M-14</text>

    <!-- External staircase -->
    <g transform="translate(-44,84)">
      <rect x="0" y="0" width="44" height="64" fill="#9aa1ae"/>
      <line x1="0" y1="14" x2="44" y2="14" stroke="#3a3a3a" stroke-width="1.2"/>
      <line x1="0" y1="30" x2="44" y2="30" stroke="#3a3a3a" stroke-width="1.2"/>
      <line x1="0" y1="46" x2="44" y2="46" stroke="#3a3a3a" stroke-width="1.2"/>
      <!-- Handrail -->
      <line x1="0" y1="0" x2="-12" y2="-30" stroke="#dadde3" stroke-width="1.5"/>
      <line x1="-12" y1="-30" x2="-12" y2="64" stroke="#dadde3" stroke-width="1.5"/>
    </g>

    <!-- Side ladder rungs -->
    <g transform="translate(180,16)" stroke="#dadde3" stroke-width="1.4" fill="none">
      <line x1="0" y1="0" x2="20" y2="0"/>
      <line x1="0" y1="14" x2="20" y2="14"/>
      <line x1="0" y1="28" x2="20" y2="28"/>
      <line x1="0" y1="42" x2="20" y2="42"/>
      <line x1="0" y1="56" x2="20" y2="56"/>
      <line x1="0" y1="70" x2="20" y2="70"/>
      <line x1="0" y1="84" x2="20" y2="84"/>
      <line x1="0" y1="98" x2="20" y2="98"/>
      <line x1="0" y1="112" x2="20" y2="112"/>
      <line x1="0" y1="126" x2="20" y2="126"/>
      <line x1="0" y1="0" x2="0" y2="126"/>
      <line x1="20" y1="0" x2="20" y2="126"/>
    </g>

    <!-- Corner caps -->
    <rect x="-4" y="-6" width="10" height="12" fill="#0e1a2b"/>
    <rect x="198" y="-6" width="10" height="12" fill="#0e1a2b"/>
    <rect x="-4" y="142" width="10" height="12" fill="#0e1a2b"/>
    <rect x="198" y="142" width="10" height="12" fill="#0e1a2b"/>
  </g>

  <!-- Water tank beside cabin -->
  <g transform="translate(370,158)">
    <ellipse cx="32" cy="6" rx="32" ry="6" fill="#dadde3"/>
    <path d="M0 6 L0 78 Q0 88 32 88 Q64 88 64 78 L64 6 Z" fill="#e6e8ec"/>
    <rect x="6" y="14" width="52" height="2" fill="rgba(0,0,0,0.18)"/>
    <rect x="6" y="34" width="52" height="2" fill="rgba(0,0,0,0.18)"/>
    <rect x="6" y="54" width="52" height="2" fill="rgba(0,0,0,0.18)"/>
    <rect x="6" y="74" width="52" height="2" fill="rgba(0,0,0,0.18)"/>
    <text x="32" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#3a4253">1000 L</text>
    <!-- Tank cap -->
    <rect x="22" y="-2" width="20" height="6" fill="#1a4d7a"/>
  </g>

  <!-- Subtle dust/sand at base -->
  <ellipse cx="240" cy="252" rx="180" ry="6" fill="rgba(201,169,97,0.10)"/>
</svg>
